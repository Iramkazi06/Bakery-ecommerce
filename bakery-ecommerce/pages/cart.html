<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Bakery E-Commerce</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">Your Shopping Cart</h1>
        <table class="table table-bordered mt-4">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="cart-items">
                <!-- Cart items will be dynamically inserted here -->
            </tbody>
        </table>
        <div class="row">
            <div class="col-md-6">
                <h4>Order Summary</h4>
                <p id="order-summary">Total: $0.00</p>
                <div class="input-group mb-3">
                    <input type="text" class="form-control" id="coupon-code" placeholder="Enter coupon code">
                    <button class="btn btn-primary" id="apply-coupon">Apply</button>
                </div>
            </div>
            <div class="col-md-6 text-end">
                <button class="btn btn-secondary" onclick="window.location.href='../index.html'">Continue Shopping</button>
                <button class="btn btn-success" onclick="window.location.href='checkout.html'">Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <script src="../js/cart.js"></script>
</body>
</html>
