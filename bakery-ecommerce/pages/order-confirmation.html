<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation - Bakery E-Commerce</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top">
        <div class="container">
            <a class="navbar-brand" href="../index.html">Bakery Shop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../pages/products.html">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../pages/cart.html">Cart</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="../pages/checkout.html">Checkout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="text-center">Thank You for Your Order!</h1>
        <p class="text-center">Your order has been successfully placed.</p>
        
        <div class="order-summary mt-4">
            <h2>Order Summary</h2>
            <p><strong>Order ID:</strong> <span id="order-id">#123456</span></p>
            <p><strong>Estimated Delivery Date:</strong> <span id="delivery-date">March 10, 2023</span></p>
        </div>

        <div class="text-center mt-4">
            <a href="../index.html" class="btn btn-primary">Return to Home</a>
        </div>
    </div>

    <script src="../js/app.js"></script>
</body>
</html>
