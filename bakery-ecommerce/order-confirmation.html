<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed — SweetBite</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body style="background:var(--bg-cream)">
<nav class="navbar navbar-expand-lg navbar-light">
  <div class="container">
    <a class="navbar-brand" href="index.html">🍰 SweetBite</a>
  </div>
</nav>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="sweet-card p-5 text-center">
        <div class="success-icon mb-3" style="font-size:5rem">✅</div>
        <h2 class="section-title">Order Confirmed!</h2>
        <p class="lead text-muted">Thank you for your order. Your sweet treats are on their way! 🍰</p>

        <div class="p-3 rounded-3 mb-4" style="background:rgba(168,230,207,0.3)">
          <div class="row">
            <div class="col-6 text-start">
              <small class="text-muted">Order ID</small>
              <div class="fw-bold" id="orderId">#SB000000</div>
            </div>
            <div class="col-6 text-end">
              <small class="text-muted">Estimated Delivery</small>
              <div class="fw-bold" id="deliveryDate">—</div>
            </div>
          </div>
        </div>

        <!-- Order Items -->
        <div class="text-start mb-4">
          <h6 class="fw-bold mb-3">Order Details</h6>
          <div id="orderItems"></div>
          <hr>
          <div class="d-flex justify-content-between mb-1">
            <span class="text-muted">Subtotal</span><span id="confSubtotal">₹0</span>
          </div>
          <div class="d-flex justify-content-between mb-1">
            <span class="text-muted">Delivery</span><span id="confDelivery">₹0</span>
          </div>
          <div class="d-flex justify-content-between mb-1">
            <span class="text-muted">GST (18%)</span><span id="confGST">₹0</span>
          </div>
          <div class="d-flex justify-content-between fw-bold mt-2">
            <span>Grand Total</span><span id="confTotal" style="color:var(--primary);font-size:1.1rem">₹0</span>
          </div>
        </div>

        <!-- Delivery info -->
        <div class="text-start p-3 rounded-3 mb-4" style="background:var(--bg-cream)">
          <h6 class="fw-bold mb-2"><i class="bi bi-geo-alt me-2" style="color:var(--primary)"></i>Delivering To:</h6>
          <p class="mb-0 text-muted" id="confAddress">—</p>
          <p class="mb-0 text-muted" id="confPayment">—</p>
        </div>

        <div class="d-flex gap-3 justify-content-center flex-wrap">
          <button class="btn btn-secondary-custom" data-bs-toggle="modal" data-bs-target="#trackModal">
            <i class="bi bi-geo-alt me-2"></i>Track Order
          </button>
          <a href="shop.html" class="btn btn-primary-custom">
            <i class="bi bi-bag-heart me-2"></i>Continue Shopping
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Track Modal -->
<div class="modal fade" id="trackModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-xl">
      <div class="modal-header border-0">
        <h5 class="modal-title">📦 Order Tracking</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted text-center mb-3">Order ID: <strong id="trackModalId"></strong></p>
        <div class="delivery-tracker" id="deliveryTracker"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const order = JSON.parse(sessionStorage.getItem('sweetbite_last_order'));
  if (!order) {
    document.querySelector('.sweet-card').innerHTML = '<div class="text-center py-5"><h4>No order found.</h4><a href="shop.html" class="btn btn-primary-custom mt-3">Shop Now</a></div>';
    return;
  }

  document.getElementById('orderId').textContent = order.id;
  document.getElementById('trackModalId').textContent = order.id;

  // Delivery date = today + 3 days
  const delivDate = new Date();
  delivDate.setDate(delivDate.getDate() + 3);
  document.getElementById('deliveryDate').textContent = delivDate.toLocaleDateString('en-IN', {weekday:'short',day:'numeric',month:'long'});

  // Items
  const itemsEl = document.getElementById('orderItems');
  if (order.items) {
    itemsEl.innerHTML = order.items.map(i => `
      <div class="d-flex justify-content-between align-items-center mb-2">
        <div><span class="me-2">${i.emoji}</span>${i.name} <span class="text-muted">× ${i.qty}</span></div>
        <span class="fw-semibold">₹${i.price * i.qty}</span>
      </div>
    `).join('');
  }

  const set = (id, val) => { const e = document.getElementById(id); if (e) e.textContent = val; };
  set('confSubtotal', '₹' + (order.subtotal || 0));
  set('confDelivery', order.delivery === 0 ? 'FREE' : '₹' + order.delivery);
  set('confGST', '₹' + (order.gst || 0));
  set('confTotal', '₹' + order.total);

  if (order.address) {
    document.getElementById('confAddress').textContent =
      [order.address.address, order.address.city, order.address.state, order.address.pin].filter(Boolean).join(', ');
  }
  document.getElementById('confPayment').innerHTML = `<i class="bi bi-credit-card me-1"></i>Payment: ${order.paymentMethod || 'Card'}`;

  // Tracker
  const steps = ['Order Placed', 'Confirmed', 'Out for Delivery', 'Delivered'];
  const tracker = document.getElementById('deliveryTracker');
  tracker.innerHTML = steps.map((s, i) => {
    const isDone = i < 2;
    const isActive = i === 2;
    const line = i < steps.length - 1 ? `<div class="track-line-h ${isDone||isActive?'done':''}"></div>` : '';
    return `
      <div class="track-step ${isDone?'done':''} ${isActive?'active':''}">
        <div class="track-circle">${isDone?'✓':isActive?'●':i+1}</div>
        <div class="track-label">${s}</div>
      </div>${line}
    `;
  }).join('');
});
</script>
</body>
</html>
